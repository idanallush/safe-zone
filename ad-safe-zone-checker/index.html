<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת Safe Zone למודעות</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><rect x='12' y='12' width='76' height='76' rx='12' fill='none' stroke='%2300dc82' stroke-width='3' stroke-dasharray='8 4'/><rect x='24' y='24' width='52' height='52' rx='8' fill='%233b82f6' opacity='0.3'/><path d='M50 35 L60 50 L50 65 L40 50 Z' fill='%233b82f6'/><circle cx='50' cy='50' r='6' fill='%2300dc82'/></svg>">
    <!-- Tailwind CDN: kept for single-file simplicity. For production, consider a build step with PostCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js" defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: 'transparent',
                        surface: 'rgba(20, 20, 35, 0.7)',
                        border: { DEFAULT: 'rgba(255,255,255,0.1)', light: 'rgba(255,255,255,0.06)', input: 'rgba(255,255,255,0.2)' },
                        accent: '#3B82F6',
                        text: { primary: '#FFFFFF', mid: 'rgba(255,255,255,0.6)', dim: 'rgba(255,255,255,0.4)' },
                        fn: {
                            green: '#34D399', 'green-bg': 'rgba(52,211,153,0.15)',
                            red: '#F87171', 'red-bg': 'rgba(248,113,113,0.15)',
                            blue: '#60A5FA', 'blue-bg': 'rgba(96,165,250,0.15)',
                        },
                        fb: '#1877f2',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px; line-height: 1.5; color: #fff; min-height: 100vh;
        }
        /* Blurred background image */
        body::before {
            content: ''; position: fixed; inset: -20px; z-index: -1;
            background: url('https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=1920&q=80') center/cover no-repeat;
            filter: blur(25px) brightness(0.35) saturate(1.2);
            transform: scale(1.05);
        }
        /* Dark overlay for consistent readability */
        body::after {
            content: ''; position: fixed; inset: 0; z-index: -1;
            background: rgba(10, 15, 30, 0.4);
        }

        /* Glass utility classes */
        .glass {
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }
        .glass-pill {
            background: rgba(20, 20, 35, 0.75);
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }
        .glass-subtle {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        :focus-visible { outline: 2px solid #3B82F6; outline-offset: 2px; border-radius: 4px; }
        button:focus-visible, a:focus-visible { outline: 2px solid #3B82F6; outline-offset: 2px; }

        button, .upload-box, .tab-btn, .filter-btn, .toggle-track { transition: all 0.2s ease; }

        .upload-box:hover { border-color: rgba(59,130,246,0.5) !important; background: rgba(59,130,246,0.08) !important; }
        .upload-box.drag-over { border-color: rgba(59,130,246,0.7) !important; background: rgba(59,130,246,0.12) !important; }

        .safe-zone-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: none; }
        .safe-zone-overlay.active { display: block; }
        .sz-danger { position: absolute; background: rgba(218, 165, 32, 0.28); }
        .sz-line { position: absolute; }
        .sz-line.horizontal { height: 0; left: 0; right: 0; border-top: 1.5px dashed rgba(0, 220, 130, 0.9); }
        .sz-line.vertical { width: 0; top: 0; bottom: 0; border-left: 1.5px dashed rgba(0, 220, 130, 0.9); }
        .sz-label {
            position: absolute; color: #00dc82; font-size: 9px; font-weight: 700;
            white-space: nowrap; direction: ltr; text-align: center;
            font-family: -apple-system, sans-serif;
            background: rgba(0,0,0,0.65); padding: 2px 6px; border-radius: 4px; line-height: 1;
        }

        .toggle-track {
            width: 40px; height: 22px; border-radius: 11px;
            background: rgba(255,255,255,0.15); position: relative; cursor: pointer; transition: background 0.2s;
        }
        .toggle-track.on { background: #3B82F6; }
        .toggle-knob {
            width: 16px; height: 16px; border-radius: 50%; background: white;
            position: absolute; top: 3px; transition: 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .toggle-track:not(.on) .toggle-knob { right: 3px; }
        .toggle-track.on .toggle-knob { right: 21px; }

        .mockup-media { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; }
        .mockup-media-abs { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; }

        .carousel-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(255,255,255,0.85); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 25; font-size: 10px; color: #333; line-height: 1;
        }
        .carousel-nav:hover { background: white; transform: translateY(-50%) scale(1.1); }
        .carousel-nav:active { transform: translateY(-50%) scale(0.95); }
        .carousel-nav.prev { left: 4px; }
        .carousel-nav.next { right: 4px; }

        .feed-carousel-mockup {
            width: 100%; max-width: 300px; background: #fff;
            border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
        }
        .feed-carousel-track {
            display: flex; gap: 3px; overflow-x: auto; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .feed-carousel-track::-webkit-scrollbar { display: none; }
        .feed-carousel-slide { flex: 0 0 78%; scroll-snap-align: start; position: relative; }

        .feed-mockup {
            width: 100%; max-width: 320px; background: #fff;
            border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
        }

        .vertical-mockup {
            width: 190px; aspect-ratio: 9/16; border-radius: 10px;
            overflow: hidden; position: relative; background: #000;
        }

        /* Mockup screen — simple container, no phone chrome */
        .mockup-screen {
            position: relative; border-radius: 12px;
            overflow: hidden; background: #000;
        }
        .mockup-screen.vertical {
            width: 190px; aspect-ratio: 9/16;
        }

        .gdn-preview-container {
            position: relative; background: rgba(255,255,255,0.05); overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08); border-radius: 4px;
        }

        .export-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
            display: none; align-items: center; justify-content: center;
        }
        .export-overlay.active { display: flex; }

        .tab-btn { transition: all 0.15s; }
        .filter-btn { transition: all 0.15s; }

        .placement-row-wrap { position: relative; }
        .placement-row-scroll {
            display: flex; gap: 10px; overflow-x: auto; scroll-snap-type: x proximity;
            -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px;
        }
        .placement-row-scroll::-webkit-scrollbar { display: none; }
        .placement-row-scroll .pair-card { flex: 0 0 auto; scroll-snap-align: start; }
        /* Scroll hint arrows — RTL: "more" is to the LEFT */
        .scroll-hint {
            position: absolute; top: 0; bottom: 2px; width: 52px; z-index: 5;
            pointer-events: none; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.3s;
        }
        .scroll-hint-left {
            left: 0;
            background: linear-gradient(to right, rgba(5,10,25,0.9) 0%, rgba(5,10,25,0.5) 50%, transparent 100%);
            opacity: 1;
        }
        .scroll-hint-right {
            right: 0;
            background: linear-gradient(to left, rgba(5,10,25,0.9) 0%, rgba(5,10,25,0.5) 50%, transparent 100%);
            opacity: 0;
        }
        .scroll-hint.hidden { opacity: 0; }
        .scroll-hint.visible { opacity: 1; }
        .scroll-hint-arrow {
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;
            pointer-events: auto; cursor: pointer; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.15);
            animation: pulse-hint 2s ease-in-out infinite;
        }
        .scroll-hint-arrow:hover { background: rgba(255,255,255,0.35); animation: none; }
        .scroll-hint-arrow svg { opacity: 0.9; }
        @keyframes pulse-hint {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.15); }
            50% { transform: scale(1.1); box-shadow: 0 0 0 6px rgba(255,255,255,0); }
        }

        /* Section titles */
        .section-title { color: rgba(255,255,255,0.9); font-weight: 600; }

        /* Accessibility: respect reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .scroll-hint-arrow { animation: none !important; }
        }

        /* Ensure cursor-pointer on all interactive elements */
        .tab-btn, .filter-btn, .carousel-nav, .scroll-hint-arrow,
        .pair-card, button, a[href], [role="switch"] {
            cursor: pointer;
        }

        /* Export mode: replace glass/blur effects with solid backgrounds for html2canvas */
        body.export-mode .glass,
        body.export-mode .glass-pill,
        body.export-mode .glass-subtle {
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        body.export-mode .glass { background: rgba(15, 20, 40, 0.95) !important; }
        body.export-mode .glass-pill { background: rgba(15, 20, 40, 0.95) !important; }
        body.export-mode .glass-subtle { background: rgba(25, 30, 50, 0.9) !important; }
        body.export-mode .scroll-hint { display: none !important; }
        body.export-mode .placement-row-scroll { overflow: visible !important; flex-wrap: wrap !important; gap: 12px !important; }
        body.export-mode #export-img-btn { display: none !important; }

        /* Print styles */
        @media print {
            body { background: #111 !important; }
            body::before { display: none !important; }
            header, .upload-box, .toggle-track, #export-img-btn, .carousel-nav, .filter-btn, #gdn-filter { display: none !important; }
            .placement-row-scroll { overflow: visible !important; flex-wrap: wrap !important; }
            .pair-card { break-inside: avoid; }
            @page { margin: 10mm; }
        }

        /* Responsive */
        @media (max-width: 640px) {
            header { flex-direction: column; gap: 8px; padding: 10px 12px !important; border-radius: 0 !important; }
            header h1 { font-size: 15px; }
            header .flex.items-center.gap-2 { width: 100%; justify-content: space-between; }
            .tab-btn { font-size: 11px !important; padding: 6px 10px !important; }
            #facebook-section { padding: 10px 8px; }
            .upload-box { min-width: 0; flex: 1 1 120px; }
            .placement-row-scroll { gap: 6px; }
            .pair-card { min-width: 200px; }
            #gdn-section { padding: 16px 10px; }
            .filter-btn { font-size: 11px !important; padding: 4px 8px !important; }
            #gdn-grid { gap: 8px; }
            .export-overlay > div { margin: 8px; padding: 16px; }
        }
    </style>
</head>
<body class="min-h-screen text-white">

    <!-- Header -->
    <header class="glass-pill mx-4 mt-4 px-6 py-3 flex items-center justify-between">
        <h1 class="text-lg font-semibold text-white">בדיקת Safe Zone למודעות</h1>
        <div class="flex items-center gap-3">
            <button id="export-img-btn" onclick="exportAsPDF()" aria-label="ייצוא PDF" class="px-4 py-1.5 bg-accent text-white text-[12px] rounded-full font-medium hover:bg-blue-600 transition-colors hidden">
                <span dir="ltr">PDF</span> ייצוא
            </button>
            <div class="flex" dir="ltr">
                <button class="tab-btn px-5 py-1.5 text-[13px] font-medium rounded-l-full" data-tab="facebook" onclick="switchTab('facebook')">
                    Facebook & Instagram
                </button>
                <button class="tab-btn px-5 py-1.5 text-[13px] font-medium rounded-r-full" data-tab="gdn" onclick="switchTab('gdn')">
                    Google Display Network
                </button>
            </div>
        </div>
    </header>

    <!-- Notification -->
    <div id="notification" class="fixed top-4 left-1/2 -translate-x-1/2 glass-pill text-white px-5 py-2.5 text-sm z-50 hidden" role="alert"></div>

    <!-- ==================== FACEBOOK SECTION ==================== -->
    <div id="facebook-section" class="mx-auto px-4 py-5" style="max-width:100%;">

        <!-- Upload Area - compact inline -->
        <div class="flex gap-2 mb-4 items-center flex-wrap">
            <div class="upload-box glass-subtle flex items-center gap-2 border-dashed !border-[rgba(255,255,255,0.15)] px-3 py-2 cursor-pointer relative transition-all"
                 id="story-upload" onclick="document.getElementById('story-input').click()"
                 ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'story')">
                <button class="absolute top-1 left-1 w-4 h-4 text-white/40 rounded text-[10px] leading-none hidden z-20 hover:text-white" onclick="event.stopPropagation(); clearMedia('story')" aria-label="Clear uploaded media">&times;</button>
                <div id="story-icon"><svg class="text-white/40" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/></svg></div>
                <div><div class="text-[12px] font-medium text-white">תמונה בודדת</div><div class="text-[10px] text-white/40">9:16</div></div>
                <input type="file" id="story-input" accept="image/*,video/*" class="hidden" onchange="handleUpload(event, 'story')">
                <div id="story-preview-container" class="hidden"><img class="w-6 h-8 object-cover rounded" /></div>
            </div>

            <div class="upload-box glass-subtle flex items-center gap-2 border-dashed !border-[rgba(255,255,255,0.15)] px-3 py-2 cursor-pointer relative transition-all"
                 id="feed45-upload" onclick="document.getElementById('feed45-input').click()"
                 ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'feed45')">
                <button class="absolute top-1 left-1 w-4 h-4 text-white/40 rounded text-[10px] leading-none hidden z-20 hover:text-white" onclick="event.stopPropagation(); clearMedia('feed45')" aria-label="Clear feed media">&times;</button>
                <div id="feed45-icon"><svg class="text-white/40" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="2" width="18" height="20" rx="2"/></svg></div>
                <div><div class="text-[12px] font-medium text-white">פיד 4:5</div><div class="text-[10px] text-white/40">1080×1350</div></div>
                <input type="file" id="feed45-input" accept="image/*,video/*" class="hidden" onchange="handleUpload(event, 'feed45')">
                <div id="feed45-preview-container" class="hidden"><img class="w-6 h-8 object-cover rounded" /></div>
            </div>

            <div class="upload-box glass-subtle flex items-center gap-2 border-dashed !border-[rgba(255,255,255,0.15)] px-3 py-2 cursor-pointer relative transition-all"
                 id="carousel-upload" onclick="document.getElementById('carousel-input').click()"
                 ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleCarouselDrop(event)">
                <button class="absolute top-1 left-1 w-4 h-4 text-white/40 rounded text-[10px] leading-none hidden z-20 hover:text-white" onclick="event.stopPropagation(); clearCarousel()" aria-label="Clear carousel images">&times;</button>
                <div id="carousel-icon"><svg class="text-white/40" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="13" height="18" rx="2"/><rect x="9" y="3" width="13" height="18" rx="2"/></svg></div>
                <div><div class="text-[12px] font-medium text-white">קרוסלה 9:16</div><div class="text-[10px] text-white/40">2-10</div></div>
                <input type="file" id="carousel-input" accept="image/*" multiple class="hidden" onchange="handleCarouselUpload(event)">
                <div id="carousel-preview-container" class="hidden flex gap-0.5"></div>
            </div>

            <div class="upload-box glass-subtle flex items-center gap-2 border-dashed !border-[rgba(255,255,255,0.15)] px-3 py-2 cursor-pointer relative transition-all"
                 id="carousel-sq-upload" onclick="document.getElementById('carousel-sq-input').click()"
                 ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleCarouselSqDrop(event)">
                <button class="absolute top-1 left-1 w-4 h-4 text-white/40 rounded text-[10px] leading-none hidden z-20 hover:text-white" onclick="event.stopPropagation(); clearCarouselSq()" aria-label="Clear feed carousel images">&times;</button>
                <div id="carousel-sq-icon"><svg class="text-white/40" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="16" rx="2"/><rect x="10" y="4" width="12" height="16" rx="2"/></svg></div>
                <div><div class="text-[12px] font-medium text-white">קרוסלה 1:1</div><div class="text-[10px] text-white/40">2-10</div></div>
                <input type="file" id="carousel-sq-input" accept="image/*" multiple class="hidden" onchange="handleCarouselSqUpload(event)">
                <div id="carousel-sq-preview-container" class="hidden flex gap-0.5"></div>
            </div>

            <div class="flex items-center gap-2 mr-auto">
                <div class="toggle-track on" id="sz-toggle" onclick="toggleSafeZones()" role="switch" aria-checked="true" aria-label="Toggle safe zones" tabindex="0" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleSafeZones();}">
                    <div class="toggle-knob"></div>
                </div>
                <span class="text-[11px] text-white/40">Safe Zones</span>
            </div>
        </div>


        <!-- Placement Rows (horizontal scroll sections) -->
        <div id="placements-container"></div>
    </div>

    <!-- ==================== GDN SECTION ==================== -->
    <div id="gdn-section" class="max-w-[1400px] mx-auto px-6 py-7 hidden">

        <div class="upload-box glass border-dashed !border-[rgba(255,255,255,0.15)] p-6 text-center cursor-pointer transition-all mb-7"
             onclick="document.getElementById('gdn-input').click()"
             ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleGDNDrop(event)">
            <div class="mb-2">
                <svg class="mx-auto text-white/40" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            </div>
            <div class="text-sm font-medium text-white mb-0.5">העלאת באנרים GDN</div>
            <div class="text-xs text-white/40 mb-4">הגדלים מזוהים אוטומטית לפי רזולוציה או שם הקובץ</div>
            <input type="file" id="gdn-input" accept="image/*" multiple class="hidden" onchange="handleGDNUpload(event)">
            <div id="gdn-badges" class="flex flex-wrap gap-1.5 justify-center"></div>
        </div>

        <!-- Website Mockups Section (on top) -->
        <div id="site-mockups-section" class="mb-8 hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-semibold text-white">תצוגה באתרים</h2>
                <span class="text-xs text-white/40">איך המודעות נראות באתרי המפרסמים</span>
            </div>
            <div id="site-mockups-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
        </div>

        <!-- Size Grid -->
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
                <h2 class="text-sm font-semibold text-white">גדלים שהועלו</h2>
                <div id="gdn-filter" class="flex gap-1 flex-wrap">
                    <button class="filter-btn" data-filter="all" onclick="filterGDN('all')">הכל</button>
                    <button class="filter-btn" data-filter="rectangle" onclick="filterGDN('rectangle')">Rectangle</button>
                    <button class="filter-btn" data-filter="leaderboard" onclick="filterGDN('leaderboard')">Leaderboard</button>
                    <button class="filter-btn" data-filter="skyscraper" onclick="filterGDN('skyscraper')">Skyscraper</button>
                    <button class="filter-btn" data-filter="mobile" onclick="filterGDN('mobile')">Mobile</button>
                </div>
            </div>
            <span class="text-xs text-text-dim" id="gdn-match-count"></span>
        </div>

        <div id="gdn-grid" class="flex flex-wrap gap-3 justify-center"></div>
    </div>

    <!-- Export Overlay -->
    <div id="export-overlay" class="export-overlay">
        <div class="glass p-6 max-w-md w-full mx-4 text-center">
            <h3 class="text-sm font-semibold mb-4 text-white">ייצוא PDF</h3>
            <p id="export-status" class="text-white/60 text-sm mb-4">מכין PDF...</p>
            <div class="flex gap-3 justify-center">
                <a id="export-download" download="ad-preview.pdf" class="px-5 py-2 bg-accent text-white rounded-full text-sm font-medium hover:bg-blue-600 transition-colors cursor-pointer hidden">הורד PDF</a>
                <button onclick="closeExport()" class="px-5 py-2 border border-white/20 text-white/60 rounded-full text-sm hover:bg-white/10 transition-colors">סגור</button>
            </div>
        </div>
    </div>

<script>
// ============================================================
// UTILITIES
// ============================================================
function sanitize(str) {
    const el = document.createElement('div');
    el.textContent = str;
    return el.innerHTML;
}

function revokeUrls(urls) {
    if (Array.isArray(urls)) { urls.forEach(u => { if (u) URL.revokeObjectURL(u); }); }
    else if (urls) { URL.revokeObjectURL(urls); }
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => {
        const isActive = b.dataset.tab === tab;
        const side = b.dataset.tab === 'facebook' ? 'l' : 'r';
        if (isActive) {
            b.className = `tab-btn px-5 py-1.5 text-sm font-medium rounded-${side}-full bg-accent text-white`;
        } else {
            b.className = `tab-btn px-5 py-1.5 text-sm font-medium rounded-${side}-full bg-white/5 text-white/50 border border-white/10 hover:bg-white/10 hover:text-white/80`;
        }
    });
    document.getElementById('facebook-section').classList.toggle('hidden', tab !== 'facebook');
    document.getElementById('gdn-section').classList.toggle('hidden', tab !== 'gdn');
    updateExportBtn(tab);
}

const carouselConfigs = {

};

function handleCarouselUploadGeneric(type, files) {
    if (!files.length) return;
    Array.from(files).forEach(f => {
        if (f.type.startsWith('image/')) state[type].push(URL.createObjectURL(f));
    });
    updateCarouselPreviewGeneric(type);
    renderPlacements();
    updateAllPreviews();
    document.getElementById('export-img-btn').classList.remove('hidden');
}

function clearCarouselGeneric(type) {
    revokeUrls(state[type]);
    state[type] = [];
    updateCarouselPreviewGeneric(type);
    renderPlacements();
    updateAllPreviews();
    updateExportBtn('facebook');
}

function updateCarouselPreviewGeneric(type) {
    const cfg = carouselConfigs[type];
    const box = document.getElementById(cfg.boxId);
    const container = document.getElementById(cfg.containerId);
    const icon = document.getElementById(cfg.iconId);
    const btn = box.querySelector('button');
    const items = state[cfg.stateKey];
    if (items.length > 0) {
        btn.classList.remove('hidden');
        icon.classList.add('hidden');
        container.classList.remove('hidden');
        container.innerHTML = items.map(url =>
            `<img src="${url}" class="${cfg.thumbClass} object-cover rounded" style="border:1px solid #E5E7EB;">`
        ).join('') + (cfg.showCount ? `<span class="text-[10px] text-text-dim self-center">${items.length}</span>` : '');
    } else {
        btn.classList.add('hidden');
        icon.classList.remove('hidden');
        container.classList.add('hidden');
        container.innerHTML = '';
    }
}

// Wrappers for HTML onclick handlers
function handleCarouselUpload(e) { handleCarouselUploadGeneric('carousel', e.target.files); }
function handleCarouselDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); handleCarouselUploadGeneric('carousel', e.dataTransfer.files); }

function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function handleDrop(e, type) {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0], type);
}
function handleGDNDrop(e) {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    processGDNFiles(e.dataTransfer.files);
}

// ============================================================
// FILE UPLOAD
// ============================================================
function handleUpload(e, type) { if (e.target.files[0]) processFile(e.target.files[0], type); }

function processFile(file, type) {
    // Revoke previous blob URL to prevent memory leak
    revokeUrls(state[type]);
    const url = URL.createObjectURL(file);
    const isVideo = file.type.startsWith('video/');
    state[type] = url;
    state[type + 'Type'] = isVideo ? 'video' : 'image';

    const box = document.getElementById(type + '-upload');
    box.querySelector('button').classList.remove('hidden');
    document.getElementById(type + '-icon').classList.add('hidden');

    const container = document.getElementById(type + '-preview-container');
    container.innerHTML = '';
    container.classList.remove('hidden');

    const el = isVideo ? document.createElement('video') : document.createElement('img');
    el.src = url;
    el.className = 'max-w-full max-h-[140px] rounded-lg mx-auto';
    if (isVideo) { el.muted = true; el.autoplay = true; el.loop = true; el.playsInline = true; }
    container.appendChild(el);

    document.getElementById('export-img-btn').classList.remove('hidden');
    updateAllPreviews();
}

function clearMedia(type) {
    revokeUrls(state[type]);
    state[type] = null;
    state[type + 'Type'] = null;
    const box = document.getElementById(type + '-upload');
    box.querySelector('button').classList.add('hidden');
    document.getElementById(type + '-icon').classList.remove('hidden');
    const container = document.getElementById(type + '-preview-container');
    container.innerHTML = '';
    container.classList.add('hidden');
    document.getElementById(type + '-input').value = '';
    updateExportBtn('facebook');
    updateAllPreviews();
}

function createMediaEl(ratio) {
    if (!state[ratio]) return null;
    if (state[ratio + 'Type'] === 'video') {
        const v = document.createElement('video');
        v.src = state[ratio]; v.muted = true; v.autoplay = true; v.loop = true; v.playsInline = true;
        return v;
    }
    const img = document.createElement('img');
    img.src = state[ratio];
    return img;
}

function createSafeZoneOverlay(mockupType) {
    const spec = safeZoneSpecs[mockupType];
    if (!spec) return null;

    const overlay = document.createElement('div');
    overlay.className = 'safe-zone-overlay' + (state.safeZones ? ' active' : '');

    // Semi-transparent dark overlays on danger zones
    addZone(overlay, `top:0;left:0;right:0;height:${spec.top}%;`);
    addZone(overlay, `bottom:0;left:0;right:0;height:${spec.bottom}%;`);
    if (spec.left > 0) addZone(overlay, `top:${spec.top}%;left:0;width:${spec.left}%;bottom:${spec.bottom}%;`);
    if (spec.right > 0) addZone(overlay, `top:${spec.top}%;right:0;width:${spec.right}%;bottom:${spec.bottom}%;`);

    // Dashed border lines at safe zone edges
    addLine(overlay, 'horizontal', `top:${spec.top}%`);
    addLine(overlay, 'horizontal', `bottom:${spec.bottom}%`);

    // Labels: "14% · 358px" format
    addLabel(overlay, `${spec.top}% · ${spec.px.top}px`, `top:${spec.top}%;left:50%;transform:translate(-50%,-120%);`);
    addLabel(overlay, `${spec.bottom}% · ${spec.px.bottom}px`, `bottom:${spec.bottom}%;left:50%;transform:translate(-50%,120%);`);

    if (spec.left > 0) {
        addLine(overlay, 'vertical', `left:${spec.left}%`);
        addLabel(overlay, `${spec.left}% · ${spec.px.left}px`, `left:${spec.left}%;top:50%;transform:translate(-120%,-50%);font-size:7px;`);
    }
    if (spec.right > 0) {
        addLine(overlay, 'vertical', `left:${100 - spec.right}%`);
        addLabel(overlay, `${spec.right}% · ${spec.px.right}px`, `left:${100 - spec.right}%;top:50%;transform:translate(-120%,-50%);font-size:7px;`);
    }

    return overlay;
}

function addZone(parent, style) {
    const el = document.createElement('div');
    el.className = 'sz-danger';
    el.style.cssText = style;
    parent.appendChild(el);
}

function addLine(parent, dir, style) {
    const el = document.createElement('div');
    el.className = 'sz-line ' + dir;
    el.style.cssText = style;
    parent.appendChild(el);
}
function addLabel(parent, text, style) {
    const el = document.createElement('div');
    el.className = 'sz-label';
    el.textContent = text;
    el.style.cssText = style;
    parent.appendChild(el);
}

function toggleSafeZones() {
    state.safeZones = !state.safeZones;
    document.getElementById('sz-toggle').classList.toggle('on', state.safeZones);
    document.querySelectorAll('#facebook-section .safe-zone-overlay').forEach(el => el.classList.toggle('active', state.safeZones));
}

// Placement rows: grouped by format, all items in one row
const placementRows = [
    { key: 'vertical',       label: 'סטוריז ורילס',  ids: ['ig-stories','fb-stories','ig-reels','fb-reels','ig-stories-car','fb-stories-car','ig-reels-car','fb-reels-car'] },
    { key: 'feed',           label: 'פיד',            ids: ['ig-feed','fb-feed'] },
    { key: 'feed-carousel',  label: 'קרוסלה פיד',     ids: ['ig-feed-car','fb-feed-car'] },
];

function hasMediaForPlacement(p) {
    if (p.ratio === 'carousel') return state.carousel.length >= 2;
    if (p.ratio === 'carouselSq') return state.carouselSq.length >= 2;
    if (p.ratio === 'feed45') return !!state.feed45;
    return !!state[p.ratio];
}

function getPlacement(id) { return placements.find(p => p.id === id); }

function renderPlacements() {
    const container = document.getElementById('placements-container');
    container.innerHTML = '';

    placementRows.forEach(row => {
        const allPlacements = row.ids.map(getPlacement).filter(Boolean);
        const visiblePlacements = allPlacements.filter(p => {
            if (p.ratio === 'carousel') return state.carousel.length >= 2;
            if (p.ratio === 'carouselSq') return state.carouselSq.length >= 2;
            return true;
        });
        if (visiblePlacements.length === 0) return;

        const section = document.createElement('div');
        section.className = 'mb-4';
        section.innerHTML = `<div class="text-base font-bold text-white/90 mb-2">${row.label}</div>`;

        const rowWrap = document.createElement('div');
        rowWrap.className = 'placement-row-wrap';

        const grid = document.createElement('div');
        grid.className = 'placement-row-scroll';
        const scrollId = 'scroll-' + row.key;
        grid.id = scrollId;

        visiblePlacements.forEach(p => {
            const card = document.createElement('div');
            card.className = 'pair-card glass overflow-hidden hover:border-white/20 transition-colors';
            card.id = 'card-' + p.id;

            const isFeed = p.mockup === 'feedCarousel' || p.mockup === 'feedPost';
            card.style.width = isFeed ? '280px' : '240px';

            card.innerHTML = `
                <div class="flex items-center gap-1.5 px-2.5 py-1.5 border-b border-white/5">
                    ${getPlatformBadge(p.platform)}
                    <span class="text-[10px] font-semibold text-white/80">${p.name}</span>
                </div>
                <div class="flex justify-center items-center p-1.5" id="body-${p.id}"></div>
            `;
            grid.appendChild(card);
        });

        // Scroll hint arrows (RTL-aware)
        const hintLeft = document.createElement('div');
        hintLeft.className = 'scroll-hint scroll-hint-left';
        hintLeft.innerHTML = `<div class="scroll-hint-arrow" onclick="document.getElementById('${scrollId}').scrollBy({left:-200,behavior:'smooth'})"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></div>`;

        const hintRight = document.createElement('div');
        hintRight.className = 'scroll-hint scroll-hint-right';
        hintRight.innerHTML = `<div class="scroll-hint-arrow" onclick="document.getElementById('${scrollId}').scrollBy({left:200,behavior:'smooth'})"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>`;

        rowWrap.appendChild(grid);
        rowWrap.appendChild(hintLeft);
        rowWrap.appendChild(hintRight);
        section.appendChild(rowWrap);
        container.appendChild(section);

        // RTL scroll: scrollLeft is 0 at right edge, goes negative when scrolling left
        const updateHints = () => {
            const maxScroll = grid.scrollWidth - grid.clientWidth;
            const sl = grid.scrollLeft; // In RTL: 0 = right edge, negative = scrolled left
            // Show left arrow when NOT fully scrolled left (more content to the left)
            hintLeft.classList.toggle('hidden', Math.abs(sl) >= maxScroll - 5);
            // Show right arrow when scrolled away from right edge
            hintRight.classList.toggle('visible', Math.abs(sl) > 30);
            hintRight.classList.toggle('hidden', Math.abs(sl) <= 30);
        };
        grid.addEventListener('scroll', updateHints);
        // Initial check after render
        setTimeout(updateHints, 100);
    });
}

function updateAllPreviews() {
    placements.forEach(p => {
        const body = document.getElementById('body-' + p.id);
        if (!body) return;
        body.innerHTML = '';

        if (!hasMediaForPlacement(p)) {
            const label = p.ratio === 'carousel' ? 'העלה קרוסלה' : p.ratio === 'carouselSq' ? 'העלה תמונות פיד' : p.ratio === 'feed45' ? 'העלה תמונה 4:5' : 'העלה מדיה';
            body.innerHTML = `<span class="text-white/30 text-xs">${label}</span>`;
            return;
        }
        let el;
        switch (p.mockup) {
            case 'story':          el = buildStoryMockup(p); break;
            case 'reels':          el = buildReelsMockup(p); break;
            case 'storyCarousel':  el = buildStoryCarouselMockup(p); break;
            case 'reelsCarousel':  el = buildReelsCarouselMockup(p); break;

// ============================================================
// CAROUSEL NAVIGATION HELPER
// ============================================================
function carouselNav(mockupId, dir) {
    const el = document.getElementById(mockupId);
    if (!el) return;
    let idx = parseInt(el.dataset.idx || '0');
    const total = parseInt(el.dataset.total || '1');
    idx = Math.max(0, Math.min(total - 1, idx + dir));
    el.dataset.idx = idx;
    // Update image
    const img = el.querySelector('.carousel-active-img');
    if (img) img.src = state.carousel[idx];
    // Update dots
    el.querySelectorAll('.car-dot').forEach((d, i) => {
        d.style.background = i === idx ? 'white' : 'rgba(255,255,255,0.35)';
        d.style.width = i === idx ? '10px' : '4px';
    });
    // Update progress bars (stories)
    el.querySelectorAll('.car-progress').forEach((d, i) => {
        d.style.background = i <= idx ? 'white' : 'rgba(255,255,255,0.25)';
    });
    // Update counter
    const counter = el.querySelector('.car-counter');
    if (counter) counter.textContent = `${idx + 1}/${total}`;
}

// Feed carousel - button click scrolls to next/prev card
function feedCarouselBtn(mockupId, dir) {
    const track = document.getElementById(mockupId + '-track');
    if (!track) return;
    const slide = track.querySelector('.feed-carousel-slide');
    if (!slide) return;
    const slideWidth = slide.offsetWidth + 3; // width + gap
    track.scrollBy({ left: dir * slideWidth, behavior: 'smooth' });
}

// Feed carousel - update dots on scroll
function feedCarouselOnScroll(mockupId) {
    const track = document.getElementById(mockupId + '-track');
    const el = document.getElementById(mockupId);
    if (!track || !el) return;
    const slide = track.querySelector('.feed-carousel-slide');
    if (!slide) return;
    const slideWidth = slide.offsetWidth + 3;
    const idx = Math.round(track.scrollLeft / slideWidth);
    el.dataset.idx = idx;
    el.querySelectorAll('.car-dot').forEach((d, i) => {
        d.style.background = i === idx ? '#3B82F6' : '#D1D5DB';
    });
}

function renderGDNBadges() {
    document.getElementById('gdn-badges').innerHTML = gdnSizes.map(s => {
        const matched = state.gdnImages[`${s.w}x${s.h}`];
        return `<span class="text-[10px] px-2 py-0.5 rounded ${matched ? 'bg-fn-green-bg text-fn-green' : 'bg-white/5 text-white/40'}">${s.w}x${s.h}</span>`;
    }).join('');
}

function renderGDNGrid() {
    const grid = document.getElementById('gdn-grid');
    grid.innerHTML = '';
    let matchCount = 0;
    gdnSizes.forEach(s => {
        const key = `${s.w}x${s.h}`;
        const hasImg = state.gdnImages[key];
        if (hasImg) matchCount++;
        const scale = Math.min(280 / s.w, 200 / s.h, 1);
        const pw = Math.round(s.w * scale);
        const ph = Math.round(s.h * scale);

        const card = document.createElement('div');
        card.className = 'glass p-3 flex flex-col items-center hover:border-white/20 transition-colors';
        card.dataset.cat = s.cat;
        card.innerHTML = `
            <div class="flex items-center gap-2 mb-2">
                <span class="text-[12px] font-medium text-white">${s.name}</span>
                <span class="text-[10px] text-white/40">${s.w}x${s.h}</span>
                <span class="w-2 h-2 rounded-full ${hasImg ? 'bg-fn-green' : 'bg-white/15'}"></span>
            </div>
            <div class="gdn-preview-container" style="width:${pw}px;height:${ph}px;">
                ${hasImg ? '' : '<span class="absolute inset-0 flex items-center justify-center text-white/30 text-[9px]">אין תמונה</span>'}
            </div>
        `;
        if (hasImg) {
            const prev = card.querySelector('.gdn-preview-container');
            const img = document.createElement('img');
            img.src = hasImg;
            img.className = 'w-full h-full object-cover';
            prev.innerHTML = '';
            prev.appendChild(img);
        }
        grid.appendChild(card);
    });
    const countEl = document.getElementById('gdn-match-count');
    if (countEl) countEl.textContent = `${matchCount}/${gdnSizes.length} matched`;
}

function handleGDNUpload(e) { processGDNFiles(e.target.files); }

function processGDNFiles(files) {
    if (!files.length) return;
    let matched = 0, processed = 0;
    const total = files.length;
    Array.from(files).forEach(file => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
            processed++;
            let match = gdnSizes.find(s => s.w === img.naturalWidth && s.h === img.naturalHeight);
            if (!match) {
                const m = file.name.match(/(\d+)\s*[x\u00d7]\s*(\d+)/i);
                if (m) match = gdnSizes.find(s => s.w === parseInt(m[1]) && s.h === parseInt(m[2]));
            }
            if (match) {
                const key = `${match.w}x${match.h}`;
                revokeUrls(state.gdnImages[key]); // revoke previous if re-uploading
                state.gdnImages[key] = url;
                matched++;
            }
            if (processed === total) {
                renderGDNGrid(); renderGDNBadges(); renderSiteMockups();
                document.getElementById('export-img-btn').classList.remove('hidden');
                notify(`זוהו ${matched} מתוך ${total} תמונות`);
            }
        };
        img.src = url;
    });
}

function filterGDN(cat) {
    document.querySelectorAll('.filter-btn').forEach(b => {
        const isActive = b.dataset.filter === cat;
        if (isActive) {
            b.className = 'filter-btn px-3 py-1.5 text-[13px] rounded-full bg-accent text-white font-medium';
        } else {
            b.className = 'filter-btn px-3 py-1.5 text-[13px] rounded-full bg-white/5 border border-white/10 text-white/50 hover:bg-white/10 hover:text-white/80 font-medium';
        }
    });
    document.querySelectorAll('#gdn-grid > div').forEach(card => {
        card.style.display = (cat === 'all' || card.dataset.cat === cat) ? '' : 'none';
    });
}

async function exportAsPDF() {
    const isFB = !document.getElementById('facebook-section').classList.contains('hidden');
    const target = isFB ? document.getElementById('facebook-section') : document.getElementById('gdn-section');

    if (!target) { notify('אין תוכן לייצוא'); return; }

    const overlay = document.getElementById('export-overlay');
    const statusEl = document.getElementById('export-status');
    const downloadLink = document.getElementById('export-download');
    downloadLink.classList.add('hidden');
    statusEl.textContent = 'מכין PDF...';
    overlay.classList.add('active');

    // Convert blob URLs to data URLs for html2canvas compatibility
    const blobImages = target.querySelectorAll('img[src^="blob:"], video[src^="blob:"]');
    const conversions = Array.from(blobImages).map(el => {
        return new Promise(resolve => {
            if (el.tagName === 'VIDEO') { resolve(); return; }
            const canvas = document.createElement('canvas');
            canvas.width = el.naturalWidth || el.width || 300;
            canvas.height = el.naturalHeight || el.height || 300;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(el, 0, 0, canvas.width, canvas.height);
            try {
                el._originalSrc = el.src;
                el.src = canvas.toDataURL('image/png');
            } catch(e) { /* CORS */ }
            resolve();
        });
    });

    // Enter export mode: solid backgrounds instead of glass blur
    document.body.classList.add('export-mode');
    // Scroll to top to capture everything
    const prevScroll = window.scrollY;
    window.scrollTo(0, 0);

    // Small delay to let CSS apply
    await new Promise(r => setTimeout(r, 100));

    Promise.all(conversions).then(() => {
        return html2canvas(target, {
            backgroundColor: '#0c1525',
            scale: 2,
            useCORS: true,
            allowTaint: true,
            logging: false,
            scrollX: 0,
            scrollY: 0,
            windowWidth: target.scrollWidth,
            windowHeight: target.scrollHeight,
        });
    }).then(canvas => {
        // Exit export mode
        document.body.classList.remove('export-mode');
        window.scrollTo(0, prevScroll);
        blobImages.forEach(el => { if (el._originalSrc) { el.src = el._originalSrc; delete el._originalSrc; } });

        const imgData = canvas.toDataURL('image/png');
        const imgW = canvas.width;
        const imgH = canvas.height;

        // Create PDF — use mm for proper sizing, A4 landscape
        const { jsPDF } = window.jspdf;
        const pdfW = imgW / 2;
        const pdfH = imgH / 2;
        const orientation = pdfW > pdfH ? 'landscape' : 'portrait';
        const pdf = new jsPDF({ orientation, unit: 'px', format: [pdfW, pdfH], compress: true });

        pdf.addImage(imgData, 'PNG', 0, 0, pdfW, pdfH);

        const timestamp = new Date().toISOString().slice(0, 10);
        const filename = `ad-preview-${isFB ? 'facebook' : 'gdn'}-${timestamp}.pdf`;

        const pdfBlob = pdf.output('blob');
        const pdfUrl = URL.createObjectURL(pdfBlob);

        downloadLink.href = pdfUrl;
        downloadLink.download = filename;
        downloadLink.classList.remove('hidden');
        statusEl.textContent = 'ה-PDF מוכן!';
        notify('ה-PDF מוכן!');
    }).catch(err => {
        document.body.classList.remove('export-mode');
        window.scrollTo(0, prevScroll);
        blobImages.forEach(el => { if (el._originalSrc) { el.src = el._originalSrc; delete el._originalSrc; } });
        console.error('PDF export failed:', err);
        statusEl.textContent = 'שגיאה בייצוא';
        notify('שגיאה ביצירת PDF');
    });
}
function closeExport() {
    document.getElementById('export-overlay').classList.remove('active');
    document.getElementById('export-download').classList.add('hidden');
}

function parseSize(s) { const [w,h] = s.split('x').map(Number); return {w,h}; }

function adSlotHTML(slot, maxW, maxH) {
    if (!slot) return '';
    const src = state.gdnImages[slot.size];
    const s = parseSize(slot.size);
    const scale = Math.min(maxW / s.w, maxH / s.h, 1);
    const w = Math.round(s.w * scale);
    const h = Math.round(s.h * scale);
    if (src) {
        return `<img src="${src}" style="width:${w}px;height:${h}px;object-fit:cover;border-radius:2px;display:block;">`;
    }
    return `<div style="width:${w}px;height:${h}px;background:rgba(255,255,255,0.05);border:1px dashed rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;border-radius:2px;"><span style="color:rgba(255,255,255,0.3);font-size:8px;text-align:center;">${slot.label}<br>${slot.size}</span></div>`;
}
